<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Notes 🐛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior: none; }
body { font-family: 'DM Sans', sans-serif; background: #f2efe8; color: #1c1a16; -webkit-font-smoothing: antialiased; touch-action: manipulation; }
:root {
  --chores: #93963b; --chores-t: #2a2c0a;
  --projects: #6291b5; --projects-t: #ffffff;
  --aaron: #4d55a3; --aaron-t: #ffffff;
  --sofia: #6da892; --sofia-t: #1a3329;
  --bg: #f2efe8; --surface: #ffffff;
  --border: rgba(28,26,22,0.11); --text: #1c1a16; --muted: #9a9689; --radius: 13px;
}
#app { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }
#app.ready { display: flex; }
.app-bar { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:14px 22px; background:var(--surface); border-bottom:1px solid var(--border); z-index:50; }
.app-title { font-family:'Playfair Display',Georgia,serif; font-size:21px; font-weight:500; }
.app-right { display:flex; align-items:center; gap:8px; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:#93963b; display:none; animation:pulse 1s infinite; }
.sync-dot.show { display:block; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.btn-add { background:var(--text); color:#f2efe8; border:none; border-radius:9px; padding:8px 16px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; }
.btn-icon { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:16px; cursor:pointer; line-height:1; font-family:inherit; }
.btn-icon.active { background:var(--text); color:#f2efe8; border-color:transparent; }

/* desktop */
#board-desktop { display:none; flex:1; overflow-y:auto; padding:28px 22px; }
@media (min-width:680px) { #board-desktop { display:block; } }
.board-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:18px; max-width:1280px; margin:0 auto; }
.col-title { font-family:'Playfair Display',Georgia,serif; font-size:17px; font-weight:500; text-transform:uppercase; letter-spacing:0.06em; padding-bottom:12px; border-bottom:1.5px solid var(--border); margin-bottom:14px; }

/* mobile */
#board-mobile { display:none; flex-direction:column; flex:1; overflow:hidden; }
@media (max-width:679px) { #board-mobile { display:flex; } }
.m-col-header { flex-shrink:0; padding:18px 22px 10px; display:flex; align-items:center; gap:10px; }
.m-col-pip { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.m-col-title { font-family:'Playfair Display',Georgia,serif; font-size:20px; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; }
.m-viewport { flex:1; overflow:hidden; position:relative; }
.m-track { display:flex; width:400vw; height:100%; will-change:transform; }
.m-panel { width:100vw; flex-shrink:0; overflow-y:auto; padding:6px 18px 90px; }
.m-dots { flex-shrink:0; display:flex; justify-content:center; align-items:center; gap:8px; padding:14px 0; background:var(--bg); }
.mdot { height:7px; border-radius:10px; transition:width .25s ease, opacity .25s ease; cursor:pointer; }

/* cards */
.task-card { border-radius:var(--radius); padding:12px 14px; cursor:pointer; margin-bottom:8px; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
.task-card:active { opacity:.82; }
.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:3px; }
.card-title { font-size:14px; font-weight:500; line-height:1.4; }
.priority-badge { flex-shrink:0; font-size:10px; font-weight:500; padding:2px 8px; border-radius:20px; background:rgba(0,0,0,0.14); margin-top:2px; letter-spacing:0.02em; white-space:nowrap; }
.card-note { font-size:12px; line-height:1.4; margin:0 0 6px; opacity:.72; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-date { font-size:11px; opacity:.52; margin:0; }
.card-checklist { margin-top:9px; border-top:1px solid rgba(0,0,0,0.1); padding-top:8px; display:flex; flex-direction:column; gap:4px; }
.cl-row { display:flex; align-items:center; gap:7px; padding:3px 0; cursor:pointer; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
.cl-box { width:16px; height:16px; border-radius:4px; flex-shrink:0; border:1.5px solid rgba(0,0,0,0.22); display:flex; align-items:center; justify-content:center; transition:background .12s; }
.cl-box.checked { background:rgba(0,0,0,0.28); border-color:transparent; }
.cl-check-svg { width:8px; height:8px; display:none; }
.cl-box.checked .cl-check-svg { display:block; }
.cl-label { font-size:12px; line-height:1.3; }
.cl-label.done { text-decoration:line-through; opacity:.5; }
.empty-col { text-align:center; padding:28px 10px; color:var(--muted); font-size:13px; }

/* modal */
.overlay { display:none; position:fixed; inset:0; background:rgba(28,26,22,.44); z-index:100; align-items:flex-end; justify-content:center; }
@media (min-width:500px) { .overlay { align-items:center; } }
.overlay.open { display:flex; }
.modal { background:var(--surface); width:100%; max-width:460px; border-radius:20px 20px 0 0; overflow:hidden; max-height:92dvh; display:flex; flex-direction:column; animation:slideUp .22s cubic-bezier(.32,.72,0,1); }
@media (min-width:500px) { .modal { border-radius:18px; } }
@keyframes slideUp { from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1} }
.modal-scroll { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
.modal-top { flex-shrink:0; padding:16px 18px 14px; display:flex; align-items:flex-start; justify-content:space-between; }
.modal-top-plain { border-bottom:1px solid var(--border); }
.modal-label-cat { font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; margin:0 0 4px; opacity:.65; }
.modal-title-display { font-family:'Playfair Display',serif; font-size:18px; font-weight:500; line-height:1.3; margin:0; }
.modal-heading { font-family:'Playfair Display',serif; font-size:19px; font-weight:500; }
.modal-close { background:none; border:none; font-size:24px; line-height:1; cursor:pointer; opacity:.5; padding:0; flex-shrink:0; margin-left:8px; }
.modal-body { padding:18px 20px 22px; }
.field-label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 6px; display:block; }
.field-input, .field-textarea { width:100%; padding:10px 12px; border:1px solid rgba(28,26,22,.13); border-radius:10px; font-family:inherit; font-size:16px; background:#faf9f5; color:var(--text); outline:none; transition:border-color .15s; margin-bottom:16px; -webkit-appearance:none; appearance:none; }
.field-input:focus, .field-textarea:focus { border-color:rgba(28,26,22,.32); background:#fff; }
.field-textarea { resize:none; height:74px; }
.field-date { font-size:12px; color:var(--muted); margin:0 0 18px; }
.cat-pills { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:16px; }
.cpill { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; border:2px solid transparent; opacity:.42; transition:opacity .15s, border-color .15s; -webkit-tap-highlight-color:transparent; }
.cpill.active { opacity:1; border-color:rgba(0,0,0,.2); }
.ppill { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; border:2px solid transparent; background:rgba(28,26,22,.07); color:var(--text); opacity:.5; transition:opacity .15s, border-color .15s; -webkit-tap-highlight-color:transparent; }
.ppill.active { opacity:1; border-color:rgba(28,26,22,.22); background:rgba(28,26,22,.12); }
.cl-modal-item { display:flex; align-items:center; gap:9px; padding:8px 0; border-bottom:1px solid var(--border); }
.cl-modal-box { width:18px; height:18px; border-radius:5px; flex-shrink:0; cursor:pointer; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; transition:background .12s, border-color .12s; -webkit-tap-highlight-color:transparent; }
.cl-modal-box.checked { background:#4d55a3; border-color:#4d55a3; }
.cl-modal-check { width:10px; height:10px; display:none; }
.cl-modal-box.checked .cl-modal-check { display:block; }
.cl-modal-text { flex:1; font-size:14px; color:var(--text); }
.cl-modal-text.done { text-decoration:line-through; color:var(--muted); }
.cl-modal-del { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:0 2px; line-height:1; }
.cl-add-row { display:flex; gap:8px; margin-bottom:18px; }
.cl-add-input { flex:1; padding:9px 11px; border:1px solid rgba(28,26,22,.13); border-radius:9px; font-family:inherit; font-size:16px; background:#faf9f5; color:var(--text); outline:none; -webkit-appearance:none; }
.cl-add-input:focus { border-color:rgba(28,26,22,.28); background:#fff; }
.cl-add-btn { padding:9px 14px; border-radius:9px; border:1px solid rgba(28,26,22,.14); background:transparent; color:var(--text); font-family:inherit; font-size:14px; cursor:pointer; }
.btn-row { display:flex; gap:8px; }
.btn-primary { flex:2; padding:12px; border-radius:10px; border:none; background:var(--text); color:#f2efe8; font-size:15px; font-weight:500; font-family:inherit; cursor:pointer; }
.btn-complete { flex:2; padding:12px; border-radius:10px; border:none; font-size:15px; font-weight:500; font-family:inherit; cursor:pointer; }
.btn-ghost { flex:1; padding:12px; border-radius:10px; border:1px solid rgba(28,26,22,.14); background:transparent; color:var(--muted); font-size:14px; font-family:inherit; cursor:pointer; }

/* setup */
#setup { display:none; position:fixed; inset:0; background:var(--bg); z-index:200; align-items:center; justify-content:center; padding:24px; }
#setup.show { display:flex; }
.setup-card { background:var(--surface); border-radius:20px; padding:36px 28px; max-width:420px; width:100%; }
.setup-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:500; margin-bottom:6px; }
.setup-sub { font-size:14px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
.setup-step { font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.setup-input { width:100%; padding:10px 13px; border:1px solid rgba(28,26,22,.13); border-radius:10px; font-size:16px; font-family:inherit; background:#faf9f5; color:var(--text); margin-bottom:16px; outline:none; -webkit-appearance:none; }
.setup-error { font-size:13px; color:#b94040; margin-bottom:12px; display:none; }
.setup-error.show { display:block; }
.btn-setup { width:100%; padding:13px; border-radius:10px; border:none; background:var(--text); color:#f2efe8; font-size:15px; font-weight:500; font-family:inherit; cursor:pointer; }
#loading { display:none; position:fixed; inset:0; background:var(--bg); z-index:150; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
#loading.show { display:flex; }
.loading-title { font-family:'Playfair Display',serif; font-size:22px; }
.loading-sub { font-size:14px; color:var(--muted); }
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(70px); background:#1c1a16; color:#f2efe8; padding:10px 20px; border-radius:10px; font-size:14px; z-index:500; transition:transform .28s; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
#confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:1000; display:none; }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<div id="loading">
  <div class="loading-title">Notes 🐛</div>
  <div class="loading-sub">Loading your tasks…</div>
</div>

<div id="setup">
  <div class="setup-card">
    <div class="setup-title">Notes 🐛</div>
    <p class="setup-sub">Connect to your GitHub repo once per device and you're set.</p>
    <p class="setup-step">GitHub username</p>
    <input class="setup-input" id="s-user" placeholder="yourusername" autocomplete="off" autocapitalize="none" spellcheck="false">
    <p class="setup-step">Repository name</p>
    <input class="setup-input" id="s-repo" placeholder="home-tasks" autocomplete="off" autocapitalize="none" spellcheck="false">
    <p class="setup-step">Personal access token</p>
    <input class="setup-input" id="s-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <div class="setup-error" id="s-error"></div>
    <button class="btn-setup" id="s-btn" onclick="setupConnect()">Connect & go</button>
  </div>
</div>

<div id="app">
  <div class="app-bar">
    <span class="app-title">Notes 🐛</span>
    <div class="app-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="btn-icon" id="sort-btn" onclick="toggleSort()" title="Focus: easy tasks first">⏱</button>
      <button class="btn-icon" onclick="openSettings()">⚙</button>
      <button class="btn-add" onclick="openAdd()">+ Add task</button>
    </div>
  </div>
  <div id="board-desktop"><div class="board-grid" id="grid"></div></div>
  <div id="board-mobile">
    <div class="m-col-header">
      <div class="m-col-pip" id="m-pip"></div>
      <div class="m-col-title" id="m-col-title">Chores</div>
    </div>
    <div class="m-viewport" id="m-viewport">
      <div class="m-track" id="m-track">
        <div class="m-panel" id="m-panel-0"></div>
        <div class="m-panel" id="m-panel-1"></div>
        <div class="m-panel" id="m-panel-2"></div>
        <div class="m-panel" id="m-panel-3"></div>
      </div>
    </div>
    <div class="m-dots" id="m-dots"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-top" id="modal-top-color" style="display:none">
      <div>
        <p class="modal-label-cat" id="m-cat-label"></p>
        <p class="modal-title-display" id="m-title-display"></p>
      </div>
      <button class="modal-close" id="m-close-color" onclick="closeModal()">×</button>
    </div>
    <div class="modal-top modal-top-plain" id="modal-top-plain" style="display:none">
      <span class="modal-heading">New task</span>
      <button class="modal-close" style="color:var(--text)" onclick="closeModal()">×</button>
    </div>
    <div class="modal-scroll">
      <div class="modal-body">
        <label class="field-label" for="f-title">Title</label>
        <input class="field-input" id="f-title" placeholder="What needs doing?" maxlength="120" autocomplete="off">
        <label class="field-label" for="f-note">Note (optional)</label>
        <textarea class="field-textarea" id="f-note" placeholder="Any extra details…" maxlength="500"></textarea>
        <label class="field-label">Effort</label>
        <div class="cat-pills" style="margin-bottom:16px">
          <div class="ppill" id="pp-easy"   onclick="pickPriority('easy')">Easy</div>
          <div class="ppill" id="pp-medium" onclick="pickPriority('medium')">Medium</div>
          <div class="ppill" id="pp-deep"   onclick="pickPriority('deep')">Deep</div>
        </div>
        <label class="field-label">Category</label>
        <div class="cat-pills" id="cat-pills"></div>
        <label class="field-label">Checklist</label>
        <div id="cl-list"></div>
        <div class="cl-add-row">
          <input class="cl-add-input" id="cl-input" placeholder="Add a step…" maxlength="120" autocomplete="off">
          <button class="cl-add-btn" onclick="addClItem()">+ Add</button>
        </div>
        <p class="field-date" id="f-date"></p>
        <div class="btn-row" id="btns-add" style="display:none">
          <button class="btn-primary" onclick="saveTask()">Save task</button>
        </div>
        <div id="btns-edit" style="display:none">
          <div class="btn-row" style="margin-bottom:8px">
            <button class="btn-complete" id="btn-done" onclick="completeTask()">✓ Mark complete</button>
            <button class="btn-ghost" onclick="saveTask()">Save</button>
          </div>
          <div class="btn-row">
            <button class="btn-ghost" style="flex:1" onclick="deleteTask()">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CATS = [
  { id:'chores',   label:'Chores',   color:'#93963b', text:'#2a2c0a' },
  { id:'projects', label:'Projects', color:'#6291b5', text:'#ffffff' },
  { id:'aaron',    label:'Aaron',    color:'#4d55a3', text:'#ffffff' },
  { id:'sofia',    label:'Sofia',    color:'#6da892', text:'#1a3329' },
];
const PRIO = { easy:'Easy', medium:'Medium', deep:'Deep' };
// sort: easy tasks float to top → ascending effort order
const PRIO_ORDER = { easy:0, medium:1, deep:2 };
const CFG_KEY = 'notes-caterpillar-v1';

let cfg=null, tasks=[], fileSha=null;
let editingId=null, selCat='chores', selPriority=null, editChecklist=[];
let mobileCol=0, sortActive=false;
// Track IDs deleted in this session so merges don't resurrect them
let deletedIds = new Set();
let pollTimer=null;

const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

function init(){
  buildCatPills();
  const raw=localStorage.getItem(CFG_KEY);
  if(raw){ cfg=JSON.parse(raw); showLoading(); loadTasks(); } else showSetup();
  setupMobileSwipe();
  $('f-title').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();saveTask();} });
  $('cl-input').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addClItem();} });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });
}

/* ── screens ── */
const showSetup=()=>{ $('setup').classList.add('show'); hideLoading(); };
const hideSetup=()=>$('setup').classList.remove('show');
const showLoading=()=>$('loading').classList.add('show');
const hideLoading=()=>$('loading').classList.remove('show');
const showApp=()=>{ $('app').classList.add('ready'); hideLoading(); };
const showSync=()=>$('sync-dot').classList.add('show');
const hideSync=()=>$('sync-dot').classList.remove('show');

/* ── setup ── */
async function setupConnect(){
  const user=$('s-user').value.trim(),repo=$('s-repo').value.trim(),token=$('s-token').value.trim();
  const err=$('s-error'),btn=$('s-btn');
  err.classList.remove('show');
  if(!user||!repo||!token){err.textContent='Please fill in all three fields.';err.classList.add('show');return;}
  btn.textContent='Connecting…';btn.disabled=true;cfg={user,repo,token};
  try{
    await loadTasks();
    localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
    hideSetup();
  } catch {
    err.textContent='Could not connect — check username, repo name, and token.';
    err.classList.add('show');btn.textContent='Connect & go';btn.disabled=false;cfg=null;
  }
}
function openSettings(){
  $('s-user').value=cfg?.user||''; $('s-repo').value=cfg?.repo||''; $('s-token').value=cfg?.token||'';
  $('s-error').classList.remove('show'); $('s-btn').textContent='Save settings'; $('s-btn').disabled=false;
  showSetup();
}

/* ── github ── */
const apiUrl=()=>`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/tasks.json`;
const hdrs=()=>({Authorization:`token ${cfg.token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'});
function b64enc(s){return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode(parseInt(p,16))));}
function b64dec(b){return decodeURIComponent(Array.from(atob(b.replace(/\s/g,'')),c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));}

async function fetchRemote(){
  const res=await fetch(apiUrl(),{headers:hdrs()});
  if(!res.ok) throw new Error('fetch failed '+res.status);
  const d=await res.json();
  let remote=[];
  try{ remote=JSON.parse(b64dec(d.content)); }catch{}
  return { sha:d.sha, tasks:remote };
}

async function loadTasks(){
  try{
    const r=await fetchRemote();
    fileSha=r.sha; tasks=r.tasks;
  } catch(e){
    if(e.message.includes('404')){ tasks=[];fileSha=null; await saveTasks(false); }
    else throw e;
  }
  showApp(); render(); startPolling();
}

/* ── smart merge ──
   Called when our local SHA is stale (someone else saved while we were editing).
   Strategy:
     - Union of remote + local tasks by id
     - If same id exists in both, pick the one with the newer updatedAt
     - Any id in deletedIds is stripped out (respect our deletions)
     - Any id that only exists in remote and NOT in deletedIds is kept (respect their adds)
*/
function mergeTasks(remote, local){
  const map = new Map();
  for(const t of remote){
    if(!deletedIds.has(t.id)) map.set(t.id, t);
  }
  for(const t of local){
    if(deletedIds.has(t.id)) continue;
    if(map.has(t.id)){
      // keep whichever was updated more recently
      const existing=map.get(t.id);
      const remoteTime=new Date(existing.updatedAt||existing.createdAt).getTime();
      const localTime=new Date(t.updatedAt||t.createdAt).getTime();
      if(localTime>remoteTime) map.set(t.id,t);
    } else {
      map.set(t.id,t);
    }
  }
  // preserve remote ordering for tasks that only exist there; local-added go to front
  const remoteIds=new Set(remote.map(t=>t.id));
  const localOnly=[...map.values()].filter(t=>!remoteIds.has(t.id));
  const rest=[...map.values()].filter(t=>remoteIds.has(t.id))
    .sort((a,b)=>remote.findIndex(t=>t.id===a.id)-remote.findIndex(t=>t.id===b.id));
  return [...localOnly, ...rest];
}

async function saveTasks(indicator=true){
  if(indicator) showSync();
  const content=b64enc(JSON.stringify(tasks,null,2));
  const body={message:'Update tasks',content};
  if(fileSha) body.sha=fileSha;
  const res=await fetch(apiUrl(),{method:'PUT',headers:hdrs(),body:JSON.stringify(body)});

  if(res.status===409 || res.status===422){
    // SHA conflict — someone else saved first. Fetch latest, merge, retry.
    showToast('Syncing with latest changes…');
    const remote=await fetchRemote();
    tasks=mergeTasks(remote.tasks, tasks);
    fileSha=remote.sha;
    render();
    // retry
    const body2={message:'Update tasks (merged)',content:b64enc(JSON.stringify(tasks,null,2)),sha:fileSha};
    const res2=await fetch(apiUrl(),{method:'PUT',headers:hdrs(),body:JSON.stringify(body2)});
    if(!res2.ok){hideSync();throw new Error('retry failed');}
    fileSha=(await res2.json()).content.sha;
  } else if(!res.ok){
    hideSync();throw new Error('save failed '+res.status);
  } else {
    fileSha=(await res.json()).content.sha;
  }
  hideSync();
}

/* ── polling ──
   Every 45s, check if remote SHA changed. If so, merge remote into local
   (preserving any unsaved local edits) and re-render silently.
*/
function startPolling(){
  clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!cfg||!fileSha) return;
    try{
      const remote=await fetchRemote();
      if(remote.sha!==fileSha){
        // Remote changed — merge their updates into our current state
        tasks=mergeTasks(remote.tasks, tasks);
        fileSha=remote.sha;
        render();
      }
    }catch{}
  }, 45000);
}

/* ── sort ── */
function toggleSort(){
  sortActive=!sortActive;
  $('sort-btn').classList.toggle('active',sortActive);
  $('sort-btn').title=sortActive?'Focus mode on (easy first — click to turn off)':'Focus: easy tasks first';
  render();
}
function sortedCol(list){
  if(!sortActive) return list;
  return [...list].sort((a,b)=>{
    const pa=a.priority!=null?PRIO_ORDER[a.priority]:99;
    const pb=b.priority!=null?PRIO_ORDER[b.priority]:99;
    return pa-pb;
  });
}

/* ── render ── */
function render(){ renderDesktop(); renderMobilePanels(); }

function cardHTML(t){
  const c=CATS.find(x=>x.id===t.category)||CATS[0];
  const ds=new Date(t.createdAt).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
  const cl=t.checklist||[];
  const doneN=cl.filter(i=>i.done).length;
  const badge=t.priority?`<span class="priority-badge" style="color:${c.text}">${PRIO[t.priority]}</span>`:'';
  const noteHTML=t.note?`<p class="card-note" style="color:${c.text}">${esc(t.note.split('\n')[0].slice(0,70))}</p>`:'';
  const clHTML=cl.length?`<div class="card-checklist">${
    cl.map(item=>`<div class="cl-row" data-task="${t.id}" data-item="${item.id}">
      <div class="cl-box${item.done?' checked':''}">
        <svg class="cl-check-svg" viewBox="0 0 10 10" fill="none" stroke="${c.text}" stroke-width="2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="cl-label${item.done?' done':''}" style="color:${c.text}">${esc(item.text)}</span>
    </div>`).join('')
  }</div>`:'';
  return `<div class="task-card" id="card-${t.id}" style="background:${c.color}" data-id="${t.id}">
    <div class="card-top">
      <p class="card-title" style="color:${c.text}">${esc(t.text)}</p>${badge}
    </div>
    ${noteHTML}${clHTML}
    <p class="card-date" style="color:${c.text};margin-top:${cl.length?'7px':'0'}">${ds}${cl.length?` · ${doneN}/${cl.length} done`:''}</p>
  </div>`;
}

function renderDesktop(){
  $('grid').innerHTML=CATS.map(c=>{
    const col=sortedCol(tasks.filter(t=>t.category===c.id));
    return `<div><div class="col-title">${c.label}</div>${col.length?col.map(cardHTML).join(''):'<div class="empty-col">Nothing here yet</div>'}</div>`;
  }).join('');
  attachCardEvents($('grid'));
}
function renderMobilePanels(){
  CATS.forEach((cat,i)=>{
    const col=sortedCol(tasks.filter(t=>t.category===cat.id));
    $('m-panel-'+i).innerHTML=col.length?col.map(cardHTML).join(''):'<div class="empty-col" style="margin-top:32px">Nothing here yet</div>';
    attachCardEvents($('m-panel-'+i));
  });
  updateMobileHeader();buildDots();
}

/* ── event delegation ── */
function attachCardEvents(container){
  container.removeEventListener('click',container._handler);
  container._handler=function(e){
    const row=e.target.closest('.cl-row');
    if(row){e.stopPropagation();cardToggleCheck(row.dataset.task,row.dataset.item);return;}
    const card=e.target.closest('.task-card');
    if(card) openEdit(card.dataset.id);
  };
  container.addEventListener('click',container._handler);
}

function cardToggleCheck(taskId,itemId){
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  const item=(t.checklist||[]).find(i=>i.id===itemId);if(!item)return;
  item.done=!item.done;
  t.updatedAt=new Date().toISOString();
  render();
  // debounced save for checklist taps
  clearTimeout(cardToggleCheck._t);
  cardToggleCheck._t=setTimeout(async()=>{ try{await saveTasks();}catch{showToast('Could not sync');} },1200);
}

/* ── mobile swipe ── */
function updateMobileHeader(){
  const c=CATS[mobileCol];$('m-col-title').textContent=c.label;$('m-pip').style.background=c.color;
}
function setTrackPos(col,extraPx,animate){
  const t=$('m-track');
  t.style.transition=animate?'transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94)':'none';
  t.style.transform=extraPx?`translateX(calc(${-col*100}vw + ${extraPx}px))`:`translateX(${-col*100}vw)`;
}
function buildDots(){
  const el=$('m-dots');if(!el)return;
  el.innerHTML=CATS.map((c,i)=>`<div class="mdot" style="width:${i===mobileCol?22:7}px;background:${c.color};opacity:${i===mobileCol?1:.3}" onclick="goCol(${i})"></div>`).join('');
}
function goCol(i){ mobileCol=i;updateMobileHeader();setTrackPos(i,0,true);buildDots(); }

function setupMobileSwipe(){
  const vp=$('m-viewport');if(!vp)return;
  let sx=0,sy=0,dragging=false,moved=false;
  vp.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX;sy=e.touches[0].clientY;dragging=true;moved=false; },{passive:true});
  vp.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!moved&&Math.abs(dy)>Math.abs(dx)){dragging=false;return;}
    moved=true;
    const clamped=(mobileCol===0&&dx>0)?0:(mobileCol===3&&dx<0)?0:dx;
    setTrackPos(mobileCol,clamped,false);
  },{passive:true});
  vp.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    if(!moved)return; // tap — don't interfere with click
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>52){ if(dx<0&&mobileCol<3)mobileCol++; else if(dx>0&&mobileCol>0)mobileCol--; }
    updateMobileHeader();setTrackPos(mobileCol,0,true);buildDots();
  },{passive:true});
}

/* ── modal ── */
function buildCatPills(){
  $('cat-pills').innerHTML=CATS.map(c=>`<div class="cpill" id="pill-${c.id}" data-cat="${c.id}" style="background:${c.color};color:${c.text}" onclick="pickCat('${c.id}')">${c.label}</div>`).join('');
}
function pickCat(id){
  selCat=id;
  document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));
  $('pill-'+id).classList.add('active');
}
function pickPriority(p){
  selPriority=selPriority===p?null:p;
  document.querySelectorAll('.ppill').forEach(x=>x.classList.remove('active'));
  if(selPriority)$('pp-'+selPriority).classList.add('active');
}
function addClItem(){
  const input=$('cl-input'),text=input.value.trim();if(!text)return;
  editChecklist.push({id:uid(),text,done:false});
  input.value='';renderClModal();input.focus();
}
function removeClItem(id){ editChecklist=editChecklist.filter(i=>i.id!==id);renderClModal(); }
function toggleClModal(id){ const item=editChecklist.find(i=>i.id===id);if(!item)return;item.done=!item.done;renderClModal(); }
function renderClModal(){
  $('cl-list').innerHTML=editChecklist.map(item=>`
    <div class="cl-modal-item">
      <div class="cl-modal-box${item.done?' checked':''}" onclick="toggleClModal('${item.id}')">
        <svg class="cl-modal-check" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="cl-modal-text${item.done?' done':''}">${esc(item.text)}</span>
      <button class="cl-modal-del" onclick="removeClItem('${item.id}')">×</button>
    </div>`).join('');
}
function getActiveCat(){
  const pill=document.querySelector('#cat-pills .cpill.active');
  return pill?pill.dataset.cat:selCat;
}
function openAdd(){
  editingId=null;selCat='chores';selPriority=null;editChecklist=[];
  $('f-title').value='';$('f-note').value='';$('f-date').textContent='';$('cl-input').value='';
  renderClModal();
  $('modal-top-color').style.display='none';
  $('modal-top-plain').style.display='flex';
  $('btns-add').style.display='flex';
  $('btns-edit').style.display='none';
  document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));
  $('pill-chores').classList.add('active');
  document.querySelectorAll('.ppill').forEach(p=>p.classList.remove('active'));
  $('overlay').classList.add('open');
  setTimeout(()=>$('f-title').focus(),80);
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editingId=id;selCat=t.category;selPriority=t.priority||null;
  editChecklist=JSON.parse(JSON.stringify(t.checklist||[]));
  const c=CATS.find(x=>x.id===t.category)||CATS[0];
  $('f-title').value=t.text;$('f-note').value=t.note||'';$('cl-input').value='';
  renderClModal();
  $('f-date').textContent='Added '+new Date(t.createdAt).toLocaleDateString('en-CA',{month:'long',day:'numeric',year:'numeric'});
  const top=$('modal-top-color');
  top.style.display='flex';top.style.background=c.color;
  $('m-cat-label').style.color=c.text;$('m-cat-label').textContent=c.label;
  $('m-title-display').style.color=c.text;$('m-title-display').textContent=t.text;
  $('m-close-color').style.color=c.text;
  $('modal-top-plain').style.display='none';
  $('btns-add').style.display='none';
  $('btns-edit').style.display='block';
  const db=$('btn-done');db.style.background=c.color;db.style.color=c.text;
  document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('active'));
  $('pill-'+t.category).classList.add('active');
  document.querySelectorAll('.ppill').forEach(p=>p.classList.remove('active'));
  if(t.priority)$('pp-'+t.priority)?.classList.add('active');
  $('overlay').classList.add('open');
}
function closeModal(){ $('overlay').classList.remove('open');editingId=null;editChecklist=[]; }
function bgClose(e){ if(e.target===$('overlay'))closeModal(); }

/* ── task actions ── */
async function saveTask(){
  const text=$('f-title').value.trim();
  if(!text){$('f-title').focus();return;}
  const note=$('f-note').value.trim();
  const cat=getActiveCat();
  const cl=JSON.parse(JSON.stringify(editChecklist));
  const now=new Date().toISOString();
  if(editingId){
    const t=tasks.find(x=>x.id===editingId);
    if(t){ t.text=text;t.note=note;t.category=cat;t.checklist=cl;t.updatedAt=now;
      if(selPriority)t.priority=selPriority; else delete t.priority; }
  } else {
    const task={id:uid(),text,note,category:cat,checklist:cl,createdAt:now,updatedAt:now};
    if(selPriority)task.priority=selPriority;
    tasks.unshift(task);
  }
  closeModal();render();
  try{await saveTasks();}catch{showToast('Could not save — check connection');}
}

async function deleteTask(){
  if(!editingId)return;
  deletedIds.add(editingId);
  tasks=tasks.filter(t=>t.id!==editingId);
  closeModal();render();
  try{await saveTasks();}catch{showToast('Could not save — check connection');}
}

async function completeTask(){
  if(!editingId)return;
  const id=editingId;
  deletedIds.add(id);
  const card=$('card-'+id);
  let cx=window.innerWidth/2,cy=window.innerHeight/2;
  if(card){
    const r=card.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;
    card.style.transition='transform .18s ease,opacity .5s';
    card.style.transform='scale(1.08)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ card.style.transform='scale(0) rotate(10deg)';card.style.opacity='0'; }));
    setTimeout(()=>{ if(card.parentNode)card.remove(); },550);
  }
  closeModal();playZen();fireConfetti(cx,cy);
  tasks=tasks.filter(t=>t.id!==id);
  setTimeout(()=>render(),600);
  try{await saveTasks();}catch{showToast('Could not save — check connection');}
}

/* ── Zen task complete chord ── */
function playZen(){
  try{
    const A=new(window.AudioContext||window.webkitAudioContext)();
    const master=A.createGain();
    master.gain.setValueAtTime(0,A.currentTime);
    master.connect(A.destination);
    
    function note(freq,start,dur,type='sine',vol=1){
      const o=A.createOscillator();
      const g=A.createGain();
      o.type=type;
      o.frequency.value=freq;
      o.connect(g);
      g.connect(master);
      // gentle fade in
      g.gain.setValueAtTime(0,A.currentTime+start);
      g.gain.linearRampToValueAtTime(vol,A.currentTime+start+0.3);
      // sustain
      g.gain.setValueAtTime(vol,A.currentTime+start+dur-0.8);
      // gentle fade out
      g.gain.linearRampToValueAtTime(0,A.currentTime+start+dur);
      o.start(A.currentTime+start);
      o.stop(A.currentTime+start+dur+0.05);
    }
    
    // G major chord, sustained and harmonically rich
    const G4=392.00,  B4=493.88,  D5=587.33,  G5=783.99;
    
    // Root and octave (fundamental)
    note(G4,  0, 3.2, 'sine', 0.8);
    note(G5,  0, 3.2, 'sine', 0.6);
    // Chord tones with slight detune for richness
    note(B4,  0, 3.2, 'sine', 0.7);
    note(D5,  0, 3.2, 'sine', 0.65);
    
    // master fade
    master.gain.setValueAtTime(0.2,A.currentTime+3.1);
    master.gain.linearRampToValueAtTime(0,A.currentTime+3.5);
  }catch(_){}
}
/* ── confetti ── */
function fireConfetti(cx,cy){
  const canvas=$('confetti-canvas');
  canvas.style.display='block';canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const colors=['#93963b','#6291b5','#4d55a3','#6da892','#f5e87a','#ffffff','#c8d46a','#a0bce0','#b0b8e8','#9dcfb8','#eed86a'];
  const shapes=['rect','circle','ribbon'];
  function burst(ox,oy,n,sm){
    return Array.from({length:n},()=>{
      const a=Math.random()*Math.PI*2,s=(Math.random()*9+4)*sm;
      return{x:ox,y:oy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*8,
        w:Math.random()*12+4,h:Math.random()*5+2,
        color:colors[Math.floor(Math.random()*colors.length)],
        shape:shapes[Math.floor(Math.random()*shapes.length)],
        rot:Math.random()*360,vrot:(Math.random()-.5)*18,
        life:1,decay:.0055+Math.random()*.005};
    });
  }
  let pts=burst(cx,cy,180,1);
  setTimeout(()=>{pts=pts.concat(burst(cx,cy,90,1.5));},180);
  setTimeout(()=>{pts=pts.concat(burst(cx-30,cy+10,50,0.9));},360);
  let f=0;
  (function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);let any=false;
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.28;p.vx*=.99;p.rot+=p.vrot;p.life-=p.decay;
      if(p.life>0){
        any=true;ctx.save();ctx.globalAlpha=Math.min(1,p.life*2);ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        if(p.shape==='rect'){ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
        else if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/3,0,Math.PI*2);ctx.fill();}
        else{ctx.beginPath();ctx.moveTo(0,-p.h*2);ctx.lineTo(p.w/2,p.h);ctx.lineTo(-p.w/2,p.h);ctx.closePath();ctx.fill();}
        ctx.restore();
      }
    });
    if(any&&f++<440)requestAnimationFrame(loop);
    else canvas.style.display='none';
  })();
}

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
