<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes 🐛</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f2efe8;
  color: #1c1a16;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}
:root {
  --chores: #93963b;   --chores-t: #2a2c0a;
  --projects: #6291b5; --projects-t: #ffffff;
  --aaron: #4d55a3;    --aaron-t: #ffffff;
  --sofia: #6da892;    --sofia-t: #1a3329;
  --bg: #f2efe8;
  --surface: #ffffff;
  --border: rgba(28,26,22,0.1);
  --text: #1c1a16;
  --muted: #9a9689;
  --radius: 13px;
}

/* ─── APP SHELL ─────────────────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; }
#app.ready { display: flex; }

.app-bar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.app-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 21px; font-weight: 500; letter-spacing: -0.01em;
  color: var(--text);
}
.app-right { display: flex; align-items: center; gap: 10px; }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #93963b; display: none;
  animation: pulse 1s infinite;
}
.sync-dot.show { display: block; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
.btn-add {
  background: var(--text); color: #f2efe8;
  border: none; border-radius: 9px;
  padding: 8px 16px; font-size: 14px; font-weight: 500;
  font-family: inherit; cursor: pointer; transition: opacity .15s;
}
.btn-add:hover { opacity: .8; }
.btn-settings {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  font-size: 16px; cursor: pointer; line-height: 1;
  transition: background .15s;
}
.btn-settings:hover { background: rgba(28,26,22,.05); }

/* ─── DESKTOP BOARD ─────────────────────── */
#board-desktop {
  display: none; flex: 1;
  padding: 28px 22px;
}
@media (min-width: 680px) { #board-desktop { display: block; } }
.board-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px; max-width: 1280px; margin: 0 auto;
}
.col-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 17px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text); padding-bottom: 12px;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 14px;
}

/* ─── MOBILE BOARD ──────────────────────── */
#board-mobile { display: none; flex: 1; flex-direction: column; position: relative; }
@media (max-width: 679px) { #board-mobile { display: flex; } }
.m-col-header {
  padding: 20px 22px 10px;
  display: flex; align-items: center; gap: 10px;
}
.m-col-pip {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}
.m-col-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em; color: var(--text);
}
.m-cards { flex: 1; overflow-y: auto; padding: 4px 22px 90px; }
.m-dots {
  position: fixed; bottom: 20px; left: 0; right: 0;
  display: flex; justify-content: center; align-items: center;
  gap: 8px; z-index: 40; pointer-events: none;
}
.mdot {
  height: 7px; border-radius: 10px;
  transition: width .25s ease, opacity .25s ease;
  pointer-events: all; cursor: pointer;
}

/* ─── TASK CARDS ────────────────────────── */
.task-card {
  border-radius: var(--radius); padding: 13px 15px;
  cursor: pointer; margin-bottom: 9px;
  transition: transform .15s;
  will-change: transform;
}
.task-card:hover { transform: translateY(-2px); }
.task-card:active { transform: scale(.97); }
.card-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin: 0 0 4px; }
.card-note  { font-size: 12px; line-height: 1.4; margin: 0 0 7px; opacity: .72; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-date  { font-size: 11px; margin: 0; opacity: .52; }
.empty-col  { text-align: center; padding: 28px 10px; color: var(--muted); font-size: 13px; }

/* ─── MODAL ─────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(28,26,22,.42);
  z-index: 100; align-items: flex-end; justify-content: center;
}
@media (min-width: 500px) { .overlay { align-items: center; } }
.overlay.open { display: flex; }
.modal {
  background: var(--surface); width: 100%;
  max-width: 460px; overflow: hidden;
  border-radius: 20px 20px 0 0;
  animation: slideUp .22s cubic-bezier(.32,.72,0,1);
}
@media (min-width: 500px) { .modal { border-radius: 18px; max-width: 440px; } }
@keyframes slideUp { from { transform: translateY(24px); opacity:0 } to { transform:translateY(0); opacity:1 } }

.modal-top {
  padding: 18px 20px 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.modal-top-plain { border-bottom: 1px solid var(--border); }
.modal-label-cat {
  font-size: 10px; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; margin: 0 0 4px; opacity: .65;
}
.modal-title-display {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 18px; font-weight: 500; line-height: 1.3; margin: 0;
}
.modal-heading {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 19px; font-weight: 500;
}
.modal-close {
  background: none; border: none; font-size: 24px; line-height: 1;
  cursor: pointer; color: inherit; opacity: .5; padding: 0;
  flex-shrink: 0; margin-left: 8px;
}
.modal-body { padding: 18px 20px 22px; }
.field-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); margin: 0 0 6px; display: block;
}
.field-input, .field-textarea {
  width: 100%; padding: 10px 12px;
  border: 1px solid rgba(28,26,22,.13);
  border-radius: 10px; font-family: inherit; font-size: 15px;
  background: #faf9f5; color: var(--text);
  outline: none; transition: border-color .15s;
  margin-bottom: 16px;
}
.field-input:focus, .field-textarea:focus {
  border-color: rgba(28,26,22,.32); background: #fff;
}
.field-textarea { resize: none; height: 78px; font-size: 14px; }
.field-date { font-size: 12px; color: var(--muted); margin: 0 0 18px; }
.cat-pills { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 18px; }
.cpill {
  padding: 6px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: 2px solid transparent; opacity: .45;
  transition: opacity .15s, border-color .15s;
}
.cpill.active { opacity: 1; border-color: rgba(0,0,0,.18); }

.btn-row { display: flex; gap: 8px; }
.btn-primary {
  flex: 2; padding: 12px; border-radius: 10px; border: none;
  background: var(--text); color: #f2efe8;
  font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .82; }
.btn-complete {
  flex: 2; padding: 12px; border-radius: 10px; border: none;
  font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer;
  transition: opacity .15s;
}
.btn-complete:hover { opacity: .82; }
.btn-ghost {
  flex: 1; padding: 12px; border-radius: 10px;
  border: 1px solid rgba(28,26,22,.14);
  background: transparent; color: var(--muted);
  font-size: 14px; font-family: inherit; cursor: pointer;
}
.btn-ghost:hover { background: rgba(28,26,22,.04); }

/* ─── SETUP SCREEN ──────────────────────── */
#setup {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 200;
  align-items: center; justify-content: center; padding: 24px;
}
#setup.show { display: flex; }
.setup-card {
  background: var(--surface); border-radius: 20px;
  padding: 36px 30px; max-width: 420px; width: 100%;
  box-shadow: 0 8px 40px rgba(28,26,22,.1);
}
.setup-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 28px; font-weight: 500; margin-bottom: 6px;
}
.setup-sub {
  font-size: 14px; color: var(--muted); margin-bottom: 28px;
  line-height: 1.6;
}
.setup-step {
  font-size: 11px; font-weight: 500; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
}
.setup-input {
  width: 100%; padding: 10px 13px;
  border: 1px solid rgba(28,26,22,.13);
  border-radius: 10px; font-size: 14px; font-family: inherit;
  background: #faf9f5; color: var(--text);
  margin-bottom: 16px; outline: none; transition: border-color .15s;
}
.setup-input:focus { border-color: rgba(28,26,22,.32); background: #fff; }
.setup-error {
  font-size: 13px; color: #b94040;
  margin-bottom: 12px; display: none;
}
.setup-error.show { display: block; }
.btn-setup {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: var(--text); color: #f2efe8;
  font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer;
}

/* ─── LOADING ───────────────────────────── */
#loading {
  display: none; position: fixed; inset: 0; background: var(--bg);
  z-index: 150; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
#loading.show { display: flex; }
.loading-title { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; }
.loading-sub { font-size: 14px; color: var(--muted); }

/* ─── TOAST ─────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #1c1a16; color: #f2efe8;
  padding: 10px 20px; border-radius: 10px;
  font-size: 14px; z-index: 500; transition: transform .28s;
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── CONFETTI CANVAS ───────────────────── */
#confetti-canvas {
  position: fixed; inset: 0; pointer-events: none;
  z-index: 1000; display: none;
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- ── LOADING ── -->
<div id="loading">
  <div class="loading-title">Notes 🐛</div>
  <div class="loading-sub">Loading your tasks…</div>
</div>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-title">Notes 🐛</div>
    <p class="setup-sub">Connect to your GitHub repo to keep your lists in sync. You only need to do this once per device.</p>
    <p class="setup-step">GitHub username</p>
    <input class="setup-input" id="s-user" placeholder="yourusername" autocomplete="off" autocapitalize="none" spellcheck="false">
    <p class="setup-step">Repository name</p>
    <input class="setup-input" id="s-repo" placeholder="home-tasks" autocomplete="off" autocapitalize="none" spellcheck="false">
    <p class="setup-step">Personal access token</p>
    <input class="setup-input" id="s-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <div class="setup-error" id="s-error"></div>
    <button class="btn-setup" id="s-btn" onclick="setupConnect()">Connect & go</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="app-bar">
    <span class="app-title">Notes 🐛</span>
    <div class="app-right">
      <div class="sync-dot" id="sync-dot" title="Saving…"></div>
      <button class="btn-settings" onclick="openSettings()" title="Settings">⚙</button>
      <button class="btn-add" onclick="openAdd()">+ Add task</button>
    </div>
  </div>

  <!-- desktop -->
  <div id="board-desktop">
    <div class="board-grid" id="grid"></div>
  </div>

  <!-- mobile -->
  <div id="board-mobile">
    <div class="m-col-header">
      <div class="m-col-pip" id="m-pip"></div>
      <div class="m-col-title" id="m-col-title">Chores</div>
    </div>
    <div class="m-cards" id="m-cards"></div>
    <div class="m-dots" id="m-dots"></div>
  </div>
</div>

<!-- ── TASK MODAL ── -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal" id="modal">
    <!-- colored header (edit mode) -->
    <div class="modal-top" id="modal-top-color" style="display:none">
      <div>
        <p class="modal-label-cat" id="m-cat-label"></p>
        <p class="modal-title-display" id="m-title-display"></p>
      </div>
      <button class="modal-close" id="m-close-color" onclick="closeModal()">×</button>
    </div>
    <!-- plain header (add mode) -->
    <div class="modal-top modal-top-plain" id="modal-top-plain" style="display:none">
      <span class="modal-heading">New task</span>
      <button class="modal-close" style="color:var(--text)" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <label class="field-label" for="f-title">Title</label>
      <input class="field-input" id="f-title" placeholder="What needs doing?" maxlength="120">
      <label class="field-label" for="f-note">Note (optional)</label>
      <textarea class="field-textarea" id="f-note" placeholder="Any extra details…" maxlength="500"></textarea>
      <label class="field-label">Category</label>
      <div class="cat-pills" id="cat-pills"></div>
      <p class="field-date" id="f-date"></p>
      <!-- add buttons -->
      <div class="btn-row" id="btns-add" style="display:none">
        <button class="btn-primary" onclick="saveTask()">Save task</button>
      </div>
      <!-- edit buttons -->
      <div id="btns-edit" style="display:none">
        <div class="btn-row" style="margin-bottom:8px">
          <button class="btn-complete" id="btn-done" onclick="completeTask()">✓ Mark complete</button>
          <button class="btn-ghost" onclick="saveTask()">Save</button>
        </div>
        <div class="btn-row">
          <button class="btn-ghost" style="flex:1" onclick="deleteTask()">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CATEGORIES ──────────────────────────────
const CATS = [
  { id:'chores',   label:'Chores',   color:'#93963b', text:'#2a2c0a' },
  { id:'projects', label:'Projects', color:'#6291b5', text:'#ffffff' },
  { id:'aaron',    label:'Aaron',    color:'#4d55a3', text:'#ffffff' },
  { id:'sofia',    label:'Sofia',    color:'#6da892', text:'#1a3329' },
];

// ── STATE ────────────────────────────────────
const CFG_KEY = 'notes-caterpillar-v1';
let cfg = null, tasks = [], fileSha = null;
let editingId = null, selCat = 'chores', mobileCol = 0;

// ── INIT ─────────────────────────────────────
function init() {
  buildPills(); buildDots();
  const raw = localStorage.getItem(CFG_KEY);
  if (raw) { cfg = JSON.parse(raw); showLoading(); loadTasks(); }
  else showSetup();
  setupSwipe();
  document.getElementById('f-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveTask(); }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey||e.ctrlKey) && e.key==='Enter') saveTask();
  });
}

// ── SCREENS ──────────────────────────────────
const $ = id => document.getElementById(id);
const showSetup   = () => { $('setup').classList.add('show'); hideLoading(); };
const hideSetup   = () => $('setup').classList.remove('show');
const showLoading = () => $('loading').classList.add('show');
const hideLoading = () => $('loading').classList.remove('show');
const showApp     = () => { $('app').classList.add('ready'); hideLoading(); };
const showSync    = () => $('sync-dot').classList.add('show');
const hideSync    = () => $('sync-dot').classList.remove('show');

// ── SETUP ────────────────────────────────────
async function setupConnect() {
  const user  = $('s-user').value.trim();
  const repo  = $('s-repo').value.trim();
  const token = $('s-token').value.trim();
  const err = $('s-error'), btn = $('s-btn');
  err.classList.remove('show');
  if (!user || !repo || !token) {
    err.textContent = 'Please fill in all three fields.';
    err.classList.add('show'); return;
  }
  btn.textContent = 'Connecting…'; btn.disabled = true;
  cfg = { user, repo, token };
  try {
    await loadTasks();
    localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
    hideSetup();
  } catch(e) {
    err.textContent = 'Could not connect. Double-check your username, repo name, and token.';
    err.classList.add('show');
    btn.textContent = 'Connect & go'; btn.disabled = false; cfg = null;
  }
}

function openSettings() {
  if (!cfg) return showSetup();
  $('s-user').value = cfg.user || '';
  $('s-repo').value = cfg.repo || '';
  $('s-token').value = cfg.token || '';
  $('s-error').classList.remove('show');
  $('s-btn').textContent = 'Save settings'; $('s-btn').disabled = false;
  showSetup();
}

// ── GITHUB API ───────────────────────────────
const apiUrl = () => `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/tasks.json`;
const hdrs = () => ({ Authorization:`token ${cfg.token}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' });

function b64enc(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_,p) => String.fromCharCode(parseInt(p,16))));
}
function b64dec(b64) {
  return decodeURIComponent(Array.from(atob(b64.replace(/\s/g,'')), c => '%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));
}

async function loadTasks() {
  const res = await fetch(apiUrl(), { headers: hdrs() });
  if (res.status === 404) {
    tasks = []; fileSha = null;
    await saveTasks(false);
  } else if (!res.ok) {
    throw new Error('load failed');
  } else {
    const d = await res.json();
    fileSha = d.sha;
    try { tasks = JSON.parse(b64dec(d.content)); }
    catch { tasks = []; }
  }
  showApp(); render();
}

async function saveTasks(indicator = true) {
  if (indicator) showSync();
  const body = { message:'Update tasks', content: b64enc(JSON.stringify(tasks, null, 2)) };
  if (fileSha) body.sha = fileSha;
  const res = await fetch(apiUrl(), { method:'PUT', headers: hdrs(), body: JSON.stringify(body) });
  if (!res.ok) { hideSync(); throw new Error('save failed'); }
  const d = await res.json();
  fileSha = d.content.sha;
  hideSync();
}

// ── RENDER ───────────────────────────────────
function render() { renderDesktop(); renderMobile(); }

function cardHTML(t) {
  const c = CATS.find(x => x.id===t.category) || CATS[0];
  const d = new Date(t.createdAt);
  const ds = d.toLocaleDateString('en-CA', { month:'short', day:'numeric' });
  const note = t.note ? `<p class="card-note" style="color:${c.text}">${esc(t.note.split('\n')[0].slice(0,70))}</p>` : '';
  return `<div class="task-card" id="card-${t.id}" style="background:${c.color}" onclick="openEdit('${t.id}')">
    <p class="card-title" style="color:${c.text}">${esc(t.text)}</p>${note}
    <p class="card-date" style="color:${c.text}">${ds}</p>
  </div>`;
}

function renderDesktop() {
  $('grid').innerHTML = CATS.map(c => {
    const col = tasks.filter(t => t.category===c.id);
    return `<div>
      <div class="col-title">${c.label}</div>
      ${col.length ? col.map(cardHTML).join('') : '<div class="empty-col">Nothing here yet</div>'}
    </div>`;
  }).join('');
}

function renderMobile() {
  const c = CATS[mobileCol];
  $('m-col-title').textContent = c.label;
  $('m-pip').style.background = c.color;
  const col = tasks.filter(t => t.category===c.id);
  $('m-cards').innerHTML = col.length ? col.map(cardHTML).join('') : '<div class="empty-col" style="margin-top:32px">Nothing here yet</div>';
  buildDots();
}

// ── MOBILE SWIPE / DOTS ──────────────────────
function buildDots() {
  const el = $('m-dots'); if (!el) return;
  el.innerHTML = CATS.map((c,i) => `<div class="mdot" style="width:${i===mobileCol?22:7}px;background:${c.color};opacity:${i===mobileCol?1:.3}" onclick="goCol(${i})"></div>`).join('');
}

function goCol(i) { mobileCol = i; renderMobile(); }

function setupSwipe() {
  const mb = $('board-mobile'); if (!mb) return;
  let sx=0, sy=0;
  mb.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  mb.addEventListener('touchend', e => {
    const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>44) {
      if (dx<0 && mobileCol<3) goCol(mobileCol+1);
      else if (dx>0 && mobileCol>0) goCol(mobileCol-1);
    }
  }, {passive:true});
}

// ── MODAL ────────────────────────────────────
function buildPills() {
  $('cat-pills').innerHTML = CATS.map(c => `<div class="cpill" id="pill-${c.id}" style="background:${c.color};color:${c.text}" onclick="pickCat('${c.id}')">${c.label}</div>`).join('');
}

function pickCat(id) {
  selCat = id;
  document.querySelectorAll('.cpill').forEach(p => p.classList.remove('active'));
  $('pill-'+id).classList.add('active');
}

function openAdd() {
  editingId = null; selCat = 'chores';
  $('f-title').value = ''; $('f-note').value = ''; $('f-date').textContent = '';
  $('modal-top-color').style.display = 'none';
  $('modal-top-plain').style.display = 'flex';
  $('btns-add').style.display = 'flex';
  $('btns-edit').style.display = 'none';
  document.querySelectorAll('.cpill').forEach(p => p.classList.remove('active'));
  $('pill-chores').classList.add('active');
  $('overlay').classList.add('open');
  setTimeout(() => $('f-title').focus(), 80);
}

function openEdit(id) {
  const t = tasks.find(x => x.id===id); if (!t) return;
  editingId = id; selCat = t.category;
  const c = CATS.find(x => x.id===t.category) || CATS[0];
  $('f-title').value = t.text; $('f-note').value = t.note||'';
  const d = new Date(t.createdAt);
  $('f-date').textContent = 'Added '+d.toLocaleDateString('en-CA',{month:'long',day:'numeric',year:'numeric'});
  // colored header
  const top = $('modal-top-color');
  top.style.display = 'flex'; top.style.background = c.color;
  $('m-cat-label').style.color = c.text; $('m-cat-label').textContent = c.label;
  $('m-title-display').style.color = c.text; $('m-title-display').textContent = t.text;
  $('m-close-color').style.color = c.text;
  $('modal-top-plain').style.display = 'none';
  $('btns-add').style.display = 'none';
  $('btns-edit').style.display = 'block';
  // style complete button in category color
  const db = $('btn-done');
  db.style.background = c.color; db.style.color = c.text;
  document.querySelectorAll('.cpill').forEach(p => p.classList.remove('active'));
  $('pill-'+t.category).classList.add('active');
  $('overlay').classList.add('open');
}

function closeModal() { $('overlay').classList.remove('open'); editingId = null; }
function bgClose(e) { if (e.target===$('overlay')) closeModal(); }

// ── TASK ACTIONS ─────────────────────────────
async function saveTask() {
  const text = $('f-title').value.trim();
  if (!text) { $('f-title').focus(); return; }
  const note = $('f-note').value.trim();
  if (editingId) {
    const t = tasks.find(x => x.id===editingId);
    if (t) { t.text=text; t.note=note; t.category=selCat; }
  } else {
    tasks.unshift({ id:Date.now().toString(), text, note, category:selCat, createdAt:new Date().toISOString() });
  }
  closeModal(); render();
  try { await saveTasks(); } catch { showToast('Could not save — check your connection'); }
}

async function deleteTask() {
  if (!editingId) return;
  tasks = tasks.filter(t => t.id!==editingId);
  closeModal(); render();
  try { await saveTasks(); } catch { showToast('Could not save — check your connection'); }
}

async function completeTask() {
  if (!editingId) return;
  const id = editingId;
  const card = $('card-'+id);
  let cx = window.innerWidth/2, cy = window.innerHeight/2;
  if (card) {
    const r = card.getBoundingClientRect();
    cx = r.left + r.width/2; cy = r.top + r.height/2;
    card.style.transition = 'transform .18s, opacity .5s';
    card.style.transform = 'scale(1.06)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.style.transform = 'scale(0) rotate(8deg)';
      card.style.opacity = '0';
    }));
    setTimeout(() => { if(card.parentNode) card.remove(); }, 550);
  }
  closeModal();
  playDone();
  fireConfetti(cx, cy);
  tasks = tasks.filter(t => t.id!==id);
  setTimeout(() => render(), 600);
  try { await saveTasks(); } catch { showToast('Could not save — check your connection'); }
}

// ── SOUND ────────────────────────────────────
function playDone() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[0,523],[.1,659],[.2,784],[.35,1047]].forEach(([t,f]) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = f; osc.type = 'sine';
      g.gain.setValueAtTime(0.22, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.35);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.4);
    });
  } catch(_) {}
}

// ── CONFETTI ─────────────────────────────────
function fireConfetti(cx, cy) {
  const canvas = $('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#93963b','#6291b5','#4d55a3','#6da892','#f7e17a','#ffffff','#d4c87a','#a8c8e8','#c8cde8','#a8d5b8','#e8c87a'];
  const shapes = ['rect','circle','ribbon'];

  function burst(ox, oy, n, speedMult) {
    return Array.from({length:n}, () => {
      const angle = Math.random()*Math.PI*2;
      const speed = (Math.random()*8+4)*speedMult;
      return {
        x:ox, y:oy,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed - Math.random()*6,
        w: Math.random()*11+4, h: Math.random()*5+2,
        color: colors[Math.floor(Math.random()*colors.length)],
        shape: shapes[Math.floor(Math.random()*shapes.length)],
        rot: Math.random()*360, vrot:(Math.random()-.5)*16,
        life:1, decay: .006+Math.random()*.006
      };
    });
  }

  let pts = burst(cx, cy, 160, 1);
  // second wave for extra drama
  setTimeout(() => { pts = pts.concat(burst(cx, cy, 80, 1.4)); }, 200);

  let f=0;
  (function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let any=false;
    pts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=.3; p.vx*=.99; p.rot+=p.vrot; p.life-=p.decay;
      if(p.life>0) {
        any=true;
        ctx.save(); ctx.globalAlpha=Math.min(1,p.life*1.8);
        ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        if(p.shape==='rect')   { ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
        else if(p.shape==='circle') { ctx.beginPath(); ctx.arc(0,0,p.w/3,0,Math.PI*2); ctx.fill(); }
        else { ctx.beginPath(); ctx.moveTo(0,-p.h*2); ctx.lineTo(p.w/2,p.h); ctx.lineTo(-p.w/2,p.h); ctx.closePath(); ctx.fill(); }
        ctx.restore();
      }
    });
    if(any && f++<380) requestAnimationFrame(loop);
    else { canvas.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  })();
}

// ── TOAST ────────────────────────────────────
function showToast(msg) {
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ── UTIL ─────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
